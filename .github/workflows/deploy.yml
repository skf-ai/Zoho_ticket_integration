name: Deploy

# Deploys the bot to AWS with SAM.
#
# Trigger it MANUALLY from GitHub: Actions tab -> "Deploy" -> "Run workflow".
# (It can also auto-deploy on push to main — that block is commented out below,
#  enable it once you're comfortable.)
#
# Authentication uses GitHub OIDC (no long-lived AWS keys stored in GitHub).
# One-time setup is documented in DEPLOYMENT.md.

on:
  workflow_dispatch:         # manual "Run workflow" button
    inputs:
      alert_email:
        description: "Ops email for alarms. Leave blank ONLY if you have set the ALERT_EMAIL repo variable, or you accept deploying with NO monitoring."
        required: false
        default: ""
  # push:
  #   branches: ["main"]     # uncomment to auto-deploy on merge to main

permissions:
  id-token: write            # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install & test (gate deploy on green tests)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          python -m pytest -q

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: |
          sam validate -t deployment/template.yaml
          sam build -t deployment/template.yaml

      - name: SAM deploy
        run: |
          # Alarms only exist when an AlertEmail is passed. Prefer the value typed
          # into the "Run workflow" box; fall back to a repo variable set once in
          # Settings -> Secrets and variables -> Actions -> Variables (ALERT_EMAIL).
          ALERT="${{ github.event.inputs.alert_email }}"
          if [ -z "$ALERT" ]; then ALERT="${{ vars.ALERT_EMAIL }}"; fi
          if [ -z "$ALERT" ]; then
            echo "::warning::Deploying with NO monitoring — no alert_email input and no ALERT_EMAIL variable. A silent outage will look identical to a healthy system. Set one and redeploy."
          fi
          sam deploy \
            --stack-name whatsapp-zoho-bot \
            --region ap-south-1 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides AlertEmail="$ALERT"
