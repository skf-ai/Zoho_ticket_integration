AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  SAM template for Zoho ticket creation Lambda

Resources:
  ZohoTicketFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handler.lambda_handler
      Runtime: python3.9
      CodeUri: ../
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /ticket
            Method: post
