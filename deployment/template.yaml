AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  WhatsApp -> Zoho Desk support bot.
  Ingress Lambda + API Gateway + DynamoDB conversation state.

Parameters:
  SecretName:
    Type: String
    Default: siddhanta/whatsapp-zoho
    Description: AWS Secrets Manager secret holding Zoho + WhatsApp credentials.
  StateTableName:
    Type: String
    Default: whatsapp_conversation_state_v2
    # A table named whatsapp_conversation_state already exists in this account
    # (created by hand during early testing, ~2 test items, no indexes, not owned
    # by any stack). This stack cannot manage a table it did not create, and the
    # old one lacks the two indexes the accountability engine needs. So the stack
    # owns a fresh _v2 table. The old table is inert and can be deleted by hand
    # once this system is proven; see RUNBOOK.md.
    Description: Fresh stack-owned table; the pre-existing v1 test table is left untouched.
  AlertEmail:
    Type: String
    Default: ''
    Description: Optional operations email for Lambda and sweeper alarms.

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, '']]

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 256
    Environment:
      Variables:
        SECRET_NAME: !Ref SecretName
        STATE_TABLE: !Ref ConversationStateTable
        GRAPH_API_VERSION: v21.0
        # Must fit inside the webhook Lambda's timeout (below) even for a worst
        # case of two model calls plus a tool call plus the fallback reply.
        # Anything larger reintroduces the mid-request kill that stranded tickets.
        # See the budget comment in src/llm.py.
        LLM_TIMEOUT_SECONDS: '8'
        LLM_MAX_RETRIES: '0'

Resources:
  ConversationStateTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref StateTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: wa_id
          AttributeType: S
        - AttributeName: ticket_id
          AttributeType: S
        - AttributeName: due_bucket
          AttributeType: S
        - AttributeName: next_action_at
          AttributeType: S
      KeySchema:
        - AttributeName: wa_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ticket-index
          KeySchema:
            - AttributeName: ticket_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: due-index
          KeySchema:
            - AttributeName: due_bucket
              KeyType: HASH
            - AttributeName: next_action_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  WhatsappBotFunction:
    Type: AWS::Serverless::Function
    DependsOn: WebhookLogGroup
    Properties:
      Handler: src/handler.lambda_handler
      FunctionName: whatsapp-zoho-webhook
      CodeUri: ../
      # 29s is the API Gateway ceiling. The agent's own budget (src/llm.py) fits
      # well inside this in the common case; the sweeper's stuck-state recovery
      # is the safety net for the rare turn that is killed here anyway.
      Timeout: 29
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationStateTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}-*
      Events:
        WhatsappVerify:
          Type: Api
          Properties:
            Path: /whatsapp
            Method: get
        WhatsappInbound:
          Type: Api
          Properties:
            Path: /whatsapp
            Method: post
        ZohoWebhook:
          Type: Api
          Properties:
            Path: /zoho-webhook
            Method: post
        Health:
          Type: Api
          Properties:
            Path: /health
            Method: get

  SweeperFunction:
    Type: AWS::Serverless::Function
    DependsOn: SweeperLogGroup
    Properties:
      Handler: src/sweeper.lambda_handler
      FunctionName: whatsapp-zoho-sweeper
      CodeUri: ../
      Timeout: 120
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationStateTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}-*
      Events:
        HourlySweep:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Enabled: true
            Description: Process due LMS support ticket reminders and closures.
            RetryPolicy:
              MaximumRetryAttempts: 2
              MaximumEventAgeInSeconds: 3600
            DeadLetterConfig:
              Type: SQS
              QueueLogicalId: SweeperDeadLetterQueue

  WebhookLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/whatsapp-zoho-webhook
      RetentionInDays: 30

  SweeperLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/whatsapp-zoho-sweeper
      RetentionInDays: 30

  OperationsTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlertEmail
    Properties:
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  WebhookErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlertEmail
    Properties:
      AlarmDescription: WhatsApp/Zoho webhook Lambda returned an error.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref WhatsappBotFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperationsTopic

  SweeperErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlertEmail
    Properties:
      AlarmDescription: Scheduled accountability worker returned an error.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SweeperFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperationsTopic

  SweeperSilentAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlertEmail
    Properties:
      AlarmDescription: Scheduled accountability worker has not run for two hours.
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: !Ref SweeperFunction
      Statistic: Sum
      Period: 7200
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref OperationsTopic

  # A scheduled action that fails all its retries lands here. Without this alarm
  # the dead-letter queue fills silently and nobody learns a ticket stopped
  # being chased.
  SweeperDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlertEmail
    Properties:
      AlarmDescription: A scheduled accountability action failed every retry and landed in the dead-letter queue.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt SweeperDeadLetterQueue.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperationsTopic

  # Turns the single most likely silent outage -- a wrong or unset app secret,
  # which makes fail-closed signature checking reject EVERY student message --
  # into a page instead of a system that looks healthy while dropping everyone.
  SignatureRejectMetricFilter:
    Type: AWS::Logs::MetricFilter
    DependsOn: WebhookLogGroup
    Properties:
      LogGroupName: /aws/lambda/whatsapp-zoho-webhook
      FilterPattern: '"rejected inbound with bad or missing signature"'
      MetricTransformations:
        - MetricNamespace: WhatsappZoho
          MetricName: SignatureRejections
          MetricValue: '1'
          DefaultValue: 0

  SignatureRejectAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlertEmail
    Properties:
      AlarmDescription: Inbound WhatsApp messages are being rejected for a bad or missing signature -- likely a wrong or unset whatsapp_app_secret, which silences every student.
      Namespace: WhatsappZoho
      MetricName: SignatureRejections
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperationsTopic

Outputs:
  ApiBaseUrl:
    Description: Base URL for the bot API (point Meta's webhook at /whatsapp).
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
  WhatsappWebhookUrl:
    Description: Meta WhatsApp webhook URL.
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/whatsapp
  ZohoWebhookUrl:
    Description: Zoho Desk resolved-ticket workflow webhook URL.
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/zoho-webhook
  StateTable:
    Description: DynamoDB table used by the production agentic workflow.
    Value: !Ref ConversationStateTable
